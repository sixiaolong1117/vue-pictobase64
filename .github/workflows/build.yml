name: Build App

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      build_sha: ${{ steps.build_metadata.outputs.build_sha }}
      is_tag: ${{ steps.build_metadata.outputs.is_tag }}
      version: ${{ steps.build_metadata.outputs.version }}

    steps:
      - name: Extract tag version
        id: tag_version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Checkout default branch for version bump
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js for version bump
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update version, commit and push
        id: tag_commit
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          version="${{ steps.tag_version.outputs.version }}"
          default_branch="${{ github.event.repository.default_branch }}"

          npm version "${version}" --no-git-tag-version --allow-same-version

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          if git diff --cached --quiet; then
            git commit --allow-empty -m "chore: release v${version} [skip ci]"
          else
            git commit -m "chore: release v${version} [skip ci]"
          fi

          git push origin "HEAD:${default_branch}"
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Resolve build metadata
        id: build_metadata
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "is_tag=true" >> "${GITHUB_OUTPUT}"
            echo "version=${{ steps.tag_version.outputs.version }}" >> "${GITHUB_OUTPUT}"
            echo "build_sha=${{ steps.tag_commit.outputs.sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "is_tag=false" >> "${GITHUB_OUTPUT}"
            echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "build_sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, arm64]
        node: [20]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.build_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Electron app (linux arm64 - unpackaged dir only)
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64' }}
        run: yarn electron:build --linux dir --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron app
        if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64') }}
        run: yarn electron:build --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Archive build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null

          $safeRefName = "${{ github.ref_name }}" -replace '[^A-Za-z0-9._-]', '-'
          $archivePath = "release-assets/VuePicToBase64-$safeRefName-${{ matrix.os }}-${{ matrix.arch }}.zip"
          $paths = @()

          if (Test-Path dist_electron) {
            $paths += "dist_electron"
          }

          if (Test-Path dist) {
            $paths += "dist"
          }

          if ($paths.Count -eq 0) {
            throw "No build output found."
          }

          Compress-Archive -Path $paths -DestinationPath $archivePath -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: release-assets/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t assets < <(find release-assets -type f -name '*.zip' | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets found."
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${assets[@]}" \
              --title "${TAG_NAME}" \
              --generate-notes
          fi
